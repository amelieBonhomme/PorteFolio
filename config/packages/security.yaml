security:
    # Gestion du hachage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Déclaration du provider basé sur ton entité PAdmin
    providers:
        app_user_provider:
            entity:
                class: App\Entity\PAdmin
                property: login   # champ utilisé comme identifiant

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: login      # route vers ton formulaire de login
                check_path: login      # route qui traite la soumission
                username_parameter: login
                password_parameter: mdp
                default_target_path: /admin   # où rediriger après succès

            logout:
                path: logout
                target: /

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
